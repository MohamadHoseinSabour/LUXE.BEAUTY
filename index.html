<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxe Beauty Consultancy</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Vazirmatn:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: "#8c3b4b",
              "primary-light": "#b56b7a",
              "primary-pale": "#f2e6e8",
              "rose-gold": "#e0bfb8",
              "background-light": "#f7f6f6",
              "background-dark": "#1d1516",
            },
            fontFamily: {
              sans: ['Vazirmatn', 'Manrope', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
              display: ['Manrope', 'sans-serif'],
            },
            borderRadius: {
              'xl': '1rem',
              '2xl': '2rem',
              '3xl': '3rem',
            }
          }
        }
      }
    </script>
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f7f6f6;
      }
      ::-webkit-scrollbar-thumb {
        background: #d1babb;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #8c3b4b;
      }
      
      /* Range Input Styling for Before/After Slider */
      input[type=range]::-webkit-slider-thumb {
        pointer-events: all;
        width: 24px;
        height: 24px;
        -webkit-appearance: none;
        background-color: white;
        border-radius: 50%;
        box-shadow: 0 0 0 1px rgba(0,0,0,0.1);
        cursor: ew-resize;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-background-light text-gray-800 antialiased font-sans">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
